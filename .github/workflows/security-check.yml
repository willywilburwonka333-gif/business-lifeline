name: Security hardening checks

on:
  push:
    branches:
      - agent/commercial-security-hardening
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Capture lint report
        id: lint
        continue-on-error: true
        run: npm run lint > lint-report.txt 2>&1
      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: lint-report.txt
      - name: Enforce lint result
        if: steps.lint.outcome == 'failure'
        run: |
          cat lint-report.txt
          exit 1
      - name: Calculations tests
        run: node --test src/lib/calculations.test.ts src/lib/calculations-audit.test.ts
      - name: Planner tests
        run: node --test src/lib/planner.test.ts
      - name: Saved report tests
        run: node --test src/lib/saved-report.test.ts
      - name: Recovery history tests
        run: node --test src/lib/recovery-history.test.ts
      - name: Cashflow simulator tests
        run: node --test src/lib/cashflow-simulator.test.ts
      - name: Recovery playbook tests
        run: node --test src/lib/recovery-playbooks.test.ts
      - name: Business OS tests
        run: node --test src/lib/business-os.test.ts
      - name: Workspace tests
        run: node --test src/lib/workspace.test.ts
      - name: Stage 8 onboarding tests
        run: node --test src/lib/stage8-onboarding.test.ts
      - name: Recovery outcome tests
        run: node --test src/lib/recovery-outcome.test.ts
      - name: Run production build
        run: npm run build
